<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      min-height: 1080px;
      background: #0f0f1a;
      font-family: 'Inter', sans-serif;
      color: #fff;
      padding: 60px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid #2a2a3d;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .date {
      font-size: 14px;
      color: #6b7280;
    }

    .section {
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 6px 14px;
      border-radius: 6px;
      display: inline-block;
    }

    .nodejs  .section-title { background: #14532d; color: #4ade80; }
    .react   .section-title { background: #0c4a6e; color: #38bdf8; }
    .aiml    .section-title { background: #3b0764; color: #c084fc; }

    .article {
      padding: 12px 16px;
      margin-bottom: 10px;
      background: #1a1a2e;
      border-radius: 8px;
      border-left: 3px solid #2a2a3d;
    }

    .nodejs  .article { border-left-color: #4ade80; }
    .react   .article { border-left-color: #38bdf8; }
    .aiml    .article { border-left-color: #c084fc; }

    .article-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #e5e7eb;
    }

    .article-desc {
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #2a2a3d;
      text-align: center;
      font-size: 12px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">🚀 Weekly Dev Newsletter</div>
    <div class="date">{{DATE}}</div>
  </div>

  <div class="section nodejs">
    <div class="section-title">⚙️ Node.js</div>
    {{NODEJS_ARTICLES}}
  </div>

  <div class="section react">
    <div class="section-title">⚛️ React</div>
    {{REACT_ARTICLES}}
  </div>

  <div class="section aiml">
    <div class="section-title">🤖 AI/ML</div>
    {{AIML_ARTICLES}}
  </div>

  <div class="footer">
    Generated by Newsletter Bot • Happy Coding! 🎉
  </div>
</body>
</html>
