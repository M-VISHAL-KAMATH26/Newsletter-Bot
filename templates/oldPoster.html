<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      background: #f5c800;
      font-family: 'Inter', sans-serif;
      padding: 0;
    }

    /* TOP SECTION */
    .top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      min-height: 420px;
      border-bottom: 6px solid #1a5c2a;
    }

    /* LEFT — Logo + Title */
    .top-left {
      background: #f5c800;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
      border-right: 4px solid #1a5c2a;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .logo-badge {
      background: #1a5c2a;
      color: #f5c800;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .logo-badge.alt {
      background: #f5c800;
      color: #1a5c2a;
      border: 2px solid #1a5c2a;
    }

    .big-title {
      font-family: 'Anton', sans-serif;
      font-size: 72px;
      line-height: 1;
      color: #1a5c2a;
      text-transform: uppercase;
      margin-top: 12px;
    }

    /* CENTER — Featured article */
    .top-center {
      background: #f5c800;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      border-right: 4px solid #1a5c2a;
    }

    .featured-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a5c2a;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .featured-desc {
      font-size: 15px;
      color: #1a5c2a;
      line-height: 1.7;
    }

    /* RIGHT — Newsletter icon box */
    .top-right {
      background: #1a5c2a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 36px;
    }

    .newsletter-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #2e86c1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .newsletter-label {
      color: #f5c800;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* BOTTOM SECTION */
    .bottom {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      min-height: 420px;
    }

    .card {
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card:nth-child(1) {
      background: #1a5c2a;
      border-right: 4px solid #f5c800;
    }

    .card:nth-child(2) {
      background: #f5c800;
      border-right: 4px solid #1a5c2a;
    }

    .card:nth-child(3) {
      background: #1a5c2a;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .card:nth-child(1) .card-title { color: #f5c800; }
    .card:nth-child(2) .card-title { color: #1a5c2a; }
    .card:nth-child(3) .card-title { color: #f5c800; }

    .card-desc {
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .card:nth-child(1) .card-desc { color: #d4edda; text-align: left; }
    .card:nth-child(2) .card-desc { color: #1a5c2a; text-align: center; }
    .card:nth-child(3) .card-desc { color: #d4edda; text-align: left; }

    .topic-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 4px;
      letter-spacing: 0.08em;
    }

    .card:nth-child(1) .topic-tag { background: #f5c800; color: #1a5c2a; }
    .card:nth-child(2) .topic-tag { background: #1a5c2a; color: #f5c800; }
    .card:nth-child(3) .topic-tag { background: #f5c800; color: #1a5c2a; }

    .footer {
      background: #1a5c2a;
      text-align: center;
      padding: 14px;
      font-size: 12px;
      color: #f5c800;
      border-top: 4px solid #f5c800;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="top">
    <!-- Left: Logo + Title -->
    <div class="top-left">
      <div class="logo-row">
        <span class="logo-badge">NODE GUILD</span>
        <span class="logo-badge alt">NINELEAPS</span>
      </div>
      <div class="big-title">WEEKLY<br>NEWS<br>LETTER</div>
    </div>

    <!-- Center: Featured article -->
    <div class="top-center">
      <div class="featured-title">{{FEATURED_TITLE}}</div>
      <div class="featured-desc">{{FEATURED_DESC}}</div>
    </div>

    <!-- Right: Icon -->
    <div class="top-right">
      <div class="newsletter-circle">📰</div>
      <div class="newsletter-label">NEWSLETTER</div>
    </div>
  </div>

  <div class="bottom">
    <!-- Card 1: Node.js -->
    <div class="card">
      <span class="topic-tag">⚙️ NODE.JS</span>
      {{NODEJS_CARD}}
    </div>

    <!-- Card 2: React -->
    <div class="card">
      <span class="topic-tag">⚛️ REACT</span>
      {{REACT_CARD}}
    </div>

    <!-- Card 3: AI/ML -->
    <div class="card">
      <span class="topic-tag">🤖 AI/ML</span>
      {{AIML_CARD}}
    </div>
  </div>

  <div class="footer">
    Generated by Newsletter Bot • {{DATE}} • Happy Coding! 🎉
  </div>

</body>
</html>
